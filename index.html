<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPL Registration</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: Arial;
        margin: 0;
        background: #f4f4f4;
    }

    header {
        background: #2c3e50;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }

    nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        background: #34495e;
    }

    nav button {
        padding: 10px;
        margin: 5px;
        border: none;
        background: #1abc9c;
        color: white;
        cursor: pointer;
        border-radius: 5px;
        font-size: 14px;
    }

    nav button:hover {
        background: #16a085;
    }

    .section {
        display: none;
        padding: 20px;
        text-align: center;
    }

    .active {
        display: block;
    }

    input {
        padding: 10px;
        margin: 10px 0;
        width: 90%;
        max-width: 300px;
        font-size: 14px;
    }

    .btn {
        padding: 10px 20px;
        background: #e67e22;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 5px;
    }

    .btn:hover {
        background: #d35400;
    }

    /* Table Responsive */
    .table-container {
        overflow-x: auto;
    }

    table {
        margin-top: 20px;
        width: 100%;
        border-collapse: collapse;
        background: white;
        min-width: 250px;
    }

    table, th, td {
        border: 1px solid black;
    }

    th, td {
        padding: 10px;
        text-align: center;
    }

    /* 📱 Mobile Styling */
    @media (max-width: 600px) {
        header {
            font-size: 18px;
            padding: 10px;
        }

        nav button {
            font-size: 12px;
            padding: 8px;
        }

        h2 {
            font-size: 18px;
        }
    }
</style>
</head>

<body>

<header>NPL Registration</header>

<nav>
    <button onclick="showSection('batter')">Batter</button>
    <button onclick="showSection('bowler')">Bowler</button>
    <button onclick="showSection('allrounder')">All-Rounder</button>
    <button onclick="showSection('batterList')">Batter List</button>
    <button onclick="showSection('bowlerList')">Bowler List</button>
    <button onclick="showSection('allrounderList')">All-Rounder List</button>
</nav>

<!-- Registration Sections -->
<div id="batter" class="section active">
    <h2>Batter Registration</h2>
    <input type="text" id="batterName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('Batter')">Register</button>
</div>

<div id="bowler" class="section">
    <h2>Bowler Registration</h2>
    <input type="text" id="bowlerName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('Bowler')">Register</button>
</div>

<div id="allrounder" class="section">
    <h2>All-Rounder Registration</h2>
    <input type="text" id="allrounderName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('All-Rounder')">Register</button>
</div>

<!-- Lists -->
<div id="batterList" class="section">
    <h2>Batter List</h2>
    <div class="table-container">
        <table><tbody id="batterTable"></tbody></table>
    </div>
</div>

<div id="bowlerList" class="section">
    <h2>Bowler List</h2>
    <div class="table-container">
        <table><tbody id="bowlerTable"></tbody></table>
    </div>
</div>

<div id="allrounderList" class="section">
    <h2>All-Rounder List</h2>
    <div class="table-container">
        <table><tbody id="allrounderTable"></tbody></table>
    </div>
</div>

<script>
let batters = [];
let bowlers = [];
let allrounders = [];

function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    if(id === "batterList") displayBatters();
    if(id === "bowlerList") displayBowlers();
    if(id === "allrounderList") displayAllrounders();
}

function registerPlayer(type) {
    let name = "";

    if(type === "Batter") {
        name = document.getElementById("batterName").value;
        if(name) batters.push(name);
    }
    else if(type === "Bowler") {
        name = document.getElementById("bowlerName").value;
        if(name) bowlers.push(name);
    }
    else {
        name = document.getElementById("allrounderName").value;
        if(name) allrounders.push(name);
    }

    if(name === "") {
        alert("Enter name!");
        return;
    }

    alert(type + " Registered!");

    document.getElementById("batterName").value = "";
    document.getElementById("bowlerName").value = "";
    document.getElementById("allrounderName").value = "";
}

function displayBatters() {
    document.getElementById("batterTable").innerHTML =
        batters.map(n => `<tr><td>${n}</td></tr>`).join("");
}

function displayBowlers() {
    document.getElementById("bowlerTable").innerHTML =
        bowlers.map(n => `<tr><td>${n}</td></tr>`).join("");
}

function displayAllrounders() {
    document.getElementById("allrounderTable").innerHTML =
        allrounders.map(n => `<tr><td>${n}</td></tr>`).join("");
}
</script>

</body>
</html>
