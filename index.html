<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPL Registration</title>

<style>
* { box-sizing: border-box; }
body { font-family: Arial; margin: 0; background: #f4f4f4; }

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    background: #34495e;
}

nav button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #1abc9c;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

.section { display: none; padding: 20px; text-align: center; }
.active { display: block; }

input {
    padding: 10px;
    margin: 10px 0;
    width: 90%;
    max-width: 300px;
}

.btn {
    padding: 10px 20px;
    background: #e67e22;
    border: none;
    color: white;
    cursor: pointer;
}

.table-container { overflow-x: auto; }

table {
    margin-top: 20px;
    width: 100%;
    border-collapse: collapse;
    background: white;
}

table, th, td { border: 1px solid black; }
th, td { padding: 10px; }

@media (max-width: 600px) {
    header { font-size: 18px; }
}
</style>
</head>

<body>

<header>NPL Registration</header>

<nav>
    <button onclick="showSection('batter')">Batter</button>
    <button onclick="showSection('bowler')">Bowler</button>
    <button onclick="showSection('allrounder')">All-Rounder</button>
    <button onclick="showSection('batterList')">Batter List</button>
    <button onclick="showSection('bowlerList')">Bowler List</button>
    <button onclick="showSection('allrounderList')">All-Rounder List</button>
    <button onclick="enableAdmin()">Admin</button>
</nav>

<div id="batter" class="section active">
    <h2>Batter Registration</h2>
    <input type="text" id="batterName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('Batter')">Register</button>
</div>

<div id="bowler" class="section">
    <h2>Bowler Registration</h2>
    <input type="text" id="bowlerName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('Bowler')">Register</button>
</div>

<div id="allrounder" class="section">
    <h2>All-Rounder Registration</h2>
    <input type="text" id="allrounderName" placeholder="Enter Name">
    <br>
    <button class="btn" onclick="registerPlayer('All-Rounder')">Register</button>
</div>

<div id="batterList" class="section">
    <h2>Batter List</h2>
    <div class="table-container">
        <table><tbody id="batterTable"></tbody></table>
    </div>
</div>

<div id="bowlerList" class="section">
    <h2>Bowler List</h2>
    <div class="table-container">
        <table><tbody id="bowlerTable"></tbody></table>
    </div>
</div>

<div id="allrounderList" class="section">
    <h2>All-Rounder List</h2>
    <div class="table-container">
        <table><tbody id="allrounderTable"></tbody></table>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFPDlCp9Z8uDILfwaq8ORs1Ot_2tP0UNA",
  authDomain: "npl-registration-45001.firebaseapp.com",
  projectId: "npl-registration-45001",
  storageBucket: "npl-registration-45001.firebasestorage.app",
  messagingSenderId: "1079107640683",
  appId: "1:1079107640683:web:6d78e11dd91ba03560802e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 ADMIN SYSTEM (FIXED)
const ADMIN_PASSWORD = "12345";
let isAdmin = localStorage.getItem("isAdmin") === "true";

window.enableAdmin = function() {
    let pass = prompt("Enter Admin Password:");
    if(pass === ADMIN_PASSWORD) {
        isAdmin = true;
        localStorage.setItem("isAdmin", "true");
        alert("Admin mode ON");

        // 🔥 refresh UI instantly
        if(currentSnapshot) renderData(currentSnapshot);

    } else {
        alert("Wrong password");
    }
};

window.logoutAdmin = function() {
    localStorage.removeItem("isAdmin");
    isAdmin = false;
    alert("Logged out");

    if(currentSnapshot) renderData(currentSnapshot);
};

// 🔄 Section change
window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};

// ➕ Register player
window.registerPlayer = async function(type) {
    let name = "";

    if(type === "Batter") name = document.getElementById("batterName").value;
    else if(type === "Bowler") name = document.getElementById("bowlerName").value;
    else name = document.getElementById("allrounderName").value;

    if(name === "") {
        alert("Enter name!");
        return;
    }

    await addDoc(collection(db, "players"), {
        name: name,
        type: type
    });

    alert("Registered!");
};

// ❌ Delete player
window.deletePlayer = async function(id) {
    await deleteDoc(doc(db, "players", id));
};

// 🔥 SNAPSHOT + RENDER FIX
let currentSnapshot = null;

onSnapshot(collection(db, "players"), (snapshot) => {
    currentSnapshot = snapshot;
    renderData(snapshot);
});

// 🔥 RENDER FUNCTION
function renderData(snapshot) {

    let batterHTML = "", bowlerHTML = "", allrounderHTML = "";

    snapshot.forEach(docSnap => {
        let data = docSnap.data();
        let id = docSnap.id;

        let deleteBtn = isAdmin 
            ? `<button onclick="deletePlayer('${id}')">❌</button>` 
            : "";

        let row = `
        <tr>
            <td>${data.name}</td>
            <td>${deleteBtn}</td>
        </tr>
        `;

        if(data.type === "Batter") batterHTML += row;
        else if(data.type === "Bowler") bowlerHTML += row;
        else allrounderHTML += row;
    });

    document.getElementById("batterTable").innerHTML = batterHTML;
    document.getElementById("bowlerTable").innerHTML = bowlerHTML;
    document.getElementById("allrounderTable").innerHTML = allrounderHTML;
}

</script>

</body>
</html>
